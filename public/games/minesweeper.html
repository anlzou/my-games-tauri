<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷 - 经典游戏合集</title>
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/minesweeper.css">
</head>
<body>
    <div class="container">
                <!-- 扫雷游戏区域 -->
        <div id="minesweeper" class="game-area">
            <div class="mine-controls">
                <div class="difficulty-selector">
                    <button class="diff-btn active" onclick="setMineDiff('easy')">简单 9×9</button>
                    <button class="diff-btn" onclick="setMineDiff('medium')">中等 16×16</button>
                    <button class="diff-btn" onclick="setMineDiff('hard')">困难 16×30</button>
                </div>
                <div class="control-panel">
                    <button class="ctrl-btn start-btn" onclick="newMineGame()">新游戏</button>
                    <button class="ctrl-btn reset-btn" onclick="resetMineGame()">重置</button>
                    <button class="ctrl-btn custom-btn" onclick="openCustomSettings()">自定义</button>
                </div>
                <div class="info-panel">
                    <div>💣 雷数: <span id="mine-count">10</span></div>
                    <div>🚩 标记: <span id="flag-count">0</span></div>
                    <div>⏱️ 时间: <span id="mine-timer">0</span>s</div>
                </div>
                <div class="flag-mode-bar">
                    <span>🚩 标记模式:</span>
                    <div class="flag-toggle" id="flag-toggle" onclick="toggleFlagMode()"></div>
                    <span id="flag-status">关闭</span>
                </div>
            </div>
                                                <div class="minesweeper-wrapper">
                <div class="mine-grid-wrapper">
                    <div class="minesweeper-grid" id="mine-grid"></div>
                </div>
                <div class="controls-hint">左键揭开 | 右键标记 | 或开启上方标记模式</div>
            </div>
        </div>
    </div>

    <!-- 自定义设置弹窗 -->
    <div class="modal" id="custom-modal">
        <div class="modal-content custom-modal-content">
            <h2>⚙️ 自定义设置</h2>
            <div class="custom-form">
                <div class="custom-row">
                    <label>行数：</label>
                    <input type="number" id="custom-rows" min="5" max="40" value="9">
                </div>
                <div class="custom-row">
                    <label>列数：</label>
                    <input type="number" id="custom-cols" min="5" max="40" value="9">
                </div>
                <div class="custom-row">
                    <label>炸弹数：</label>
                    <input type="number" id="custom-mines" min="1" max="500" value="10">
                </div>
                <div class="custom-hint">提示：行数和列数范围 5-40，炸弹数不能超过格子总数减1</div>
            </div>
            <div class="custom-buttons">
                <button class="modal-btn custom-apply-btn" onclick="applyCustomSettings()">应用</button>
                <button class="modal-btn custom-random-btn" onclick="randomCustomSettings()">🎲 随机</button>
                <button class="modal-btn custom-cancel-btn" onclick="closeCustomSettings()">取消</button>
            </div>
        </div>
    </div>

    <script src="assets/js/common.js"></script>
    <script>initCommonLayout();</script>
    <script src="assets/js/minesweeper.js"></script>
</body>
</html>
