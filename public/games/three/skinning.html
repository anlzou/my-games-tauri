<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>骨骼动画 - 3D模型</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/three/three.css">
    <style>
        /* 覆盖通用渐变背景为纯黑，WebGPU 场景使用 TSL 着色背景 */
        body {
            background: #000;
        }
        .container { padding: 0; }
        /* 隐藏桌面端选择器（3D页面用半透明底栏） */
        .game-selector { display: none !important; }
        /* 侧边栏需要更高层级 */
        .sidebar { z-index: 200; }
        .sidebar-overlay { z-index: 190; }
        /* 确保顶部栏覆盖在画布之上 */
        .three-page .top-bar { z-index: 150; }
    </style>
</head>
<body class="three-page" data-model-id="skinning">
    <div class="container">
        <div class="game-area" id="model-area">
            <div class="three-model-selector" id="model-selector"></div>
            <div class="three-container-wrap">
                <div id="three-container"></div>
            </div>
            <div class="three-info">
                🖱 拖拽旋转视角 | 滚轮缩放 | 滑动屏幕 360° 观看
            </div>
        </div>
    </div>

    <!-- WebGPU 导入映射（必须放在 module 脚本之前） -->
    <script type="importmap">
        {
            "imports": {
                "three": "../assets/js/three/libs/three.webgpu.min.js",
                "three/webgpu": "../assets/js/three/libs/three.webgpu.min.js",
                "three/tsl": "../assets/js/three/libs/three.tsl.min.js",
                "three/addons/": "../assets/js/three/libs/"
            }
        }
    </script>

	<!-- 非模块脚本：公共导航和模型配置 -->
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/three/models.js"></script>

    <!-- 骨骼动画模块（依赖 Three.js 导入映射） -->
    <script type="module">
        import * as THREE from 'three';
        import { color, screenUV, vec2, vec4, reflector, positionWorld } from 'three/tsl';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 将依赖注入到全局，供 skinning.js 中的 initSkinning 函数使用
        window.__SKINNING_DEPS__ = { THREE, GLTFLoader };
        window.__TSL__ = { color, screenUV, vec2, vec4, reflector, positionWorld };

        // 动态加载 skinning.js（非模块脚本），加载完成后初始化
        var script = document.createElement('script');
        script.src = '../assets/js/three/skinning.js';
        script.onload = function () {
            // 初始化骨骼动画模型 - 加载 Michelle.glb（灯光和背景与 retargeting_readyplayer 一致）
            window.__skinningViewer = initSkinning('three-container', {
                path: '../assets/models/gltf/Michelle.glb',
                scale: 1,
                autoPlay: true,
                animationIndex: 0
            }, {
                fov: 40,
                camPosY: 3,
                camPosZ: 5,
                floorOpacity: 0.2
            });
        };
        document.head.appendChild(script);

        // 集成公共导航和模型选择器
        window.addEventListener('load', function () {
            if (typeof initCommonLayout === 'function') {
                initCommonLayout('three', 'models');
            }
            if (typeof initModelSelector === 'function') {
                initModelSelector();
            }
        });
    </script>
</body>
</html>
