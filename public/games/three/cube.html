<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旋转立方体 - 3D模型</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/three/three.css">
</head>
<body class="three-page">
    <div class="container">
        <div class="game-area" id="model-area">
            <div class="three-model-selector" id="model-selector"></div>
            <div class="three-container-wrap">
                <div id="three-container"></div>
            </div>
            <div class="three-info">
                🖱 拖拽旋转视角 | 滚轮缩放 | 支持触屏操作
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/three/models.js"></script>
    <script src="../assets/js/three/cube.js"></script>
    <script>
        // 使用 data-model-id 标识当前模型，initModelSelector() 会自动读取
        document.body.dataset.modelId = 'cube';
        // 初始化公共布局（侧边栏、顶部栏）
        initCommonLayout('three', 'models');
        // 初始化模型导航选择器（集中管理，替代内联重复代码）
        initModelSelector();
        // 启动当前模型
        initCube();
    </script>
</body>
</html>
